<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpanD Creation | Linktree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 35px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        .profile {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid gold;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
            margin-bottom: 15px;
        }

        .profile h1 {
            color: white;
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #b8860b;
        }

        .profile p {
            color: #dddddd;
            font-size: 1rem;
            margin-top: 8px;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.3);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 30px;
        }

        .link-card {
            background: rgba(20, 30, 45, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 60px;
            padding: 16px 25px;
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 1.2rem;
            transition: 0.25s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .link-card:hover {
            transform: scale(1.03);
            background: rgba(255, 215, 0, 0.15);
            border-color: gold;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.3);
        }

        .link-card i {
            font-size: 2rem;
            width: 40px;
            text-align: center;
            color: gold;
            filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
        }

        .link-card span {
            flex: 1;
            word-break: break-word;
        }

        .link-card small {
            color: #cccccc;
            font-size: 0.9rem;
            font-weight: 300;
            margin-left: auto;
            opacity: 0.8;
        }

        .footer {
            text-align: center;
            margin-top: 35px;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            border-top: 1px dashed rgba(255,215,0,0.3);
            padding-top: 20px;
        }

        .footer a {
            color: gold;
            text-decoration: none;
            font-weight: 500;
        }

        /* responsive touch */
        @media (max-width: 480px) {
            .container { padding: 25px 15px; }
            .link-card { padding: 14px 18px; font-size: 1rem; }
            .profile h1 { font-size: 1.8rem; }
        }
    </style>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
